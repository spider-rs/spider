# https://rustsec.org/advisories/
[advisories]
ignore = [
    # lru 0.13.0 unsound IterMut — transitive via wreq
    "RUSTSEC-2026-0002",
    # rustls-pemfile unmaintained — transitive via warp (spider_worker)
    "RUSTSEC-2025-0134",
    # rsa timing sidechannel — transitive via sqlx-mysql (no fix available)
    "RUSTSEC-2023-0071",
    # backoff unmaintained — transitive via async-openai, memvid-rs
    "RUSTSEC-2025-0012",
    # bincode unmaintained — transitive via memvid-rs, http-cache
    "RUSTSEC-2025-0141",
    # fxhash unmaintained — transitive via selectors (spider_scraper)
    "RUSTSEC-2025-0057",
    # instant unmaintained — transitive via backoff
    "RUSTSEC-2024-0384",
    # number_prefix unmaintained — transitive via indicatif (memvid-rs)
    "RUSTSEC-2025-0119",
    # paste unmaintained — transitive dep
    "RUSTSEC-2024-0436",
    # rustls-webpki CRL matching — transitive via aws-smithy-http-client (no upstream fix)
    "RUSTSEC-2026-0049",
    # rustls-webpki URI name constraints — transitive via aws-smithy-http-client rustls 0.21 (not compiled, lockfile-only)
    "RUSTSEC-2026-0098",
    # rustls-webpki wildcard name constraints — same as above
    "RUSTSEC-2026-0099",
    # rand unsound with custom logger — transitive, rand::rng() not used with custom loggers
    "RUSTSEC-2026-0097",
]
